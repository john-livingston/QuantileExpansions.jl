site_name: QuantileExpansions.jl
site_description: A distribution-generic regime-split quantile solver in Julia — closed-form seeds + one quartic polish, at C-beating speed
site_url: https://john-livingston.github.io/QuantileExpansions.jl
repo_url: https://github.com/john-livingston/QuantileExpansions.jl
repo_name: john-livingston/QuantileExpansions.jl
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle: {icon: material/brightness-7, name: Switch to dark mode}
    - scheme: slate
      primary: teal
      accent: teal
      toggle: {icon: material/brightness-4, name: Switch to light mode}
  features: [content.code.copy, navigation.sections, navigation.top]
markdown_extensions:
  - pymdownx.highlight: {anchor_linenums: true}
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - toc: {permalink: true}
  - tables
  - pymdownx.arithmatex: {generic: true}
plugins:
  - search
extra_css: [stylesheets/extra.css]
extra_javascript: [https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js]
nav:
  - Home: index.md
  - Guide: usage.md
  - Method: method.md
  - Benchmarks: benchmarks.md
  - API reference: api.md
