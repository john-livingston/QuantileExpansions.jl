name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 1.12 only: the SIMD batch kernel needs a recent LLVM (a Vec codegen
        # test fails on 1.10), and the committed Manifest is 1.12-resolved.
        julia-version: ['1.12']
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v2

      # This project is an application (no name/uuid in Project.toml), so we
      # instantiate + run the test script directly rather than using Pkg.test().
      # The committed Manifest.toml was resolved on 1.12; instantiate materializes
      # those exact versions even on older Julia, where they may fail only at
      # precompile time — so precompile inside the try, and fall back to a fresh
      # resolve (which respects julia compat bounds) on any failure.
      - name: Instantiate
        run: |
          julia --project=. -e '
            using Pkg
            ok = try
                Pkg.instantiate()
                Pkg.precompile()
                true
            catch err
                @warn "Manifest incompatible with this Julia; resolving fresh" err
                false
            end
            if !ok
                # fresh resolve respects julia compat bounds; also purge the
                # compiled cache — a depot restored by the cache action may hold
                # stale .ji files from a previous manifest topology (e.g. the
                # SparseArraysExt-of-Statistics loading failure).
                rm("Manifest.toml"; force=true)
                rm(joinpath(DEPOT_PATH[1], "compiled"); force=true, recursive=true)
                Pkg.instantiate()
                Pkg.precompile()
            end'

      - name: Run tests
        run: julia --project=. test/runtests.jl

  # Informational x86 SIMD benchmark (GitHub runners are AVX2 or AVX-512 x86-64;
  # local dev hardware is 2-wide NEON, so this is the wide-vector datapoint).
  # Manual only: run from the Actions tab ("Run workflow") when wide-vector
  # numbers are wanted; it does not fire on every push.
  simd-bench:
    name: simd bench / x86-64
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run SIMD benchmark
        run: julia --project=. -O3 bench/bench_simd.jl
